<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pemesanan</title>
</head>
<body>

    <header>
        <h1>Formulir Pemesanan</h1>
    </header>

    <nav>
        <a href="index.html">Beranda</a> |
        <a href="galery.html">Galeri Foto</a> |
        <a href="form.html">Formulir Pemesanan</a>
    </nav>

    <main>
        <section>
            <form action="#" method="post">

                <label>Nama Lengkap:</label><br>
                <input type="text" name="nama"><br><br>

                <label>Email:</label><br>
                <input type="email" name="email"><br><br>

                <label>Jenis Kelamin:</label><br>
                <input type="radio" name="jk" value="Laki-laki"> Laki-laki
                <input type="radio" name="jk" value="Perempuan"> Perempuan
                <br><br>

                <label>Pilihan Produk:</label><br>
                <input type="checkbox" name="produk" value="Pistachio Croissant"> Pistachio Croissant
                <input type="checkbox" name="produk" value="Churros"> Churros
                <input type="checkbox" name="produk" value="Vanilla Latte"> Vanilla Latte
                <input type="checkbox" name="produk" value="Hazelnut Latte"> Hazelnut Latte
                <input type="checkbox" name="produk" value="Strawberry Yakult"> Strawberry Yakult
                <br><br>

                <label>Pesan / Saran:</label><br>
                <textarea name="pesan" rows="5" cols="30"></textarea>
                <br><br>

                <label>Upload Bukti Transfer:</label><br>
                <input type="file" name="file"><br><br>

                <button type="submit">Kirim</button>

            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 UMKM Rumah Nyemil</p>
    </footer>

</body>
</html>
